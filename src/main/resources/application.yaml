spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
  main:
    lazy-initialization: true
  application:
    name: fullstack-mock-data-service
  http:
    codecs:
      max-in-memory-size: 10MB
  datasource:
    url: jdbc:h2:file:./build/inmemmory-persistence/users
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

user-mocks:
  wiremock-port: 18080
  auto-load-scripts: true
  scripts-dir: ./third-parties/users-mocks/sql

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"
