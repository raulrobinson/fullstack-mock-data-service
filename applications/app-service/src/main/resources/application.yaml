spring:
  main:
    lazy-initialization: true
  application:
    name: fullstack-mock-data-service
  http:
    codecs:
      max-in-memory-size: 10MB
  datasource:
    url: jdbc:h2:file:./build/inmemmory-persistence/users
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

server:
  port: 9080

dashboard:
  api:
    key: super-secret-dashboard-key

user-mocks:
  wiremock-port: 18080
  auto-load-scripts: true
  scripts-dir: ./third-parties/users-mocks/sql

app-security:
  mock-bearer-token: mock-token

app:
  client-api:
    jsonplaceholder:
      user:
        base-url: https://jsonplaceholder.typicode.com
        connect-timeout: 2s
        response-timeout: 3s
        read-timeout: 3s
        write-timeout: 3s
        max-connections: 100
        pending-acquire-timeout: 5s
      post:
        base-url: https://jsonplaceholder.typicode.com
        connect-timeout: 2s
        response-timeout: 3s
        read-timeout: 3s
        write-timeout: 3s
        max-connections: 100
        pending-acquire-timeout: 5s

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"
